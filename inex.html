<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MATRIX 84 PRO v7.0 - EVOLUTION</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* RESET & BASE */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background: #000; overflow: hidden; height: 100vh; width: 100vw; color: #fff; }
        
        /* GAME LAYER */
        .game-view { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        iframe { width: 100%; height: 100%; border: none; }
        
        /* TOOL CONTAINER */
        #dragTool {
            position: fixed; top: 15%; left: 15px; z-index: 9999;
            display: flex; align-items: flex-start; touch-action: none;
            will-change: transform;
        }
        
        /* ROBOT ICON */
        .robot-img { 
            width: 70px; filter: drop-shadow(0 0 15px #00f2ff); 
            animation: float 3s infinite ease-in-out; cursor: grab; 
            transition: transform 0.2s; 
        }
        .robot-img:active { transform: scale(0.9); }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        /* MAIN UI BOX */
        .content-box { 
            background: rgba(10, 10, 25, 0.95); padding: 18px; border-radius: 20px; 
            color: #fff; margin-left: 15px; min-width: 320px; 
            border: 2px solid #00f2ff; box-shadow: 0 0 40px rgba(0, 242, 255, 0.2); 
            backdrop-filter: blur(20px); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* HEADER */
        .header-info { 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid rgba(0, 242, 255, 0.2); padding-bottom: 12px; margin-bottom: 15px; 
        }
        
        .header-info span { font-size: 13px; font-weight: 800; letter-spacing: 1px; }
        
        select { 
            background: #1a2236; color: #00f2ff; border: 1px solid #00f2ff; 
            border-radius: 8px; padding: 4px 10px; font-size: 12px; outline: none; 
            cursor: pointer;
        }

        /* PREDICTION PANEL */
        .prediction-panel { 
            background: rgba(255,255,255,0.03); 
            border-radius: 15px; padding: 18px; margin-bottom: 15px; 
            border: 1px solid rgba(255,255,255,0.08); 
        }
        
        .stat-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 10px; color: #aaa; }
        
        #prediction_val { 
            font-size: 32px; text-align: center; font-weight: 900; 
            padding: 12px 0; letter-spacing: 4px; 
            min-height: 70px; display: flex; align-items: center; justify-content: center;
            text-shadow: 0 0 20px rgba(255,255,255,0.1);
            transition: all 0.3s;
        }
        
        /* STATUS GRID */
        .matrix-status { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 12px; }
        .status-item { 
            background: rgba(0,242,255,0.05); padding: 8px 12px; border-radius: 10px;
            font-size: 11px; border-left: 3px solid #00f2ff;
        }
        .status-label { display: block; color: #64748b; margin-bottom: 2px; text-transform: uppercase; font-size: 9px; }
        .status-val { font-weight: bold; color: #fff; font-size: 12px; }

        /* RESULT LOG */
        .result-display { 
            font-size: 13px; word-break: break-all; letter-spacing: 5px; 
            max-height: 60px; overflow-y: auto; padding: 12px; 
            background: #050505; border-radius: 12px; 
            font-family: 'Courier New', monospace; border: 1px solid #1e293b; text-align: center; 
        }
        .b-text { color: #ff4d4d; text-shadow: 0 0 5px #ff4d4d; } 
        .p-text { color: #3b82f6; text-shadow: 0 0 5px #3b82f6; } 
        .t-text { color: #4ade80; }
        
        .analyzing { font-style: italic; color: #00f2ff; animation: blink 1.2s infinite; font-size: 18px !important; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>

<div class="game-view">
    <iframe src="https://fly88g.com/" id="gameFrame"></iframe>
</div>

<div id="dragTool">
    <img src="https://i.postimg.cc/rwkZQhxp/Robot.gif" class="robot-img" id="robotTrigger">
    
    <div class="content-box" id="mainUI">
        <div class="header-info">
            <span>BÀN: <select id="tableSelect" onchange="onTableChange()"></select></span>
            <span style="color: #00f2ff;"><i class="fas fa-atom"></i> TOOl ChỈ HỖ TRỢ 70%</span>
        </div>
        
        <div class="prediction-panel">
            <div class="stat-row">
                <span>PHIÊN: <b id="next_round" style="color:#fff">#--</b></span>
                <span>VÀO LỆNH: <b id="kelly_bet" style="color:#fbbf24">0%</b></span>
            </div>
            <div id="prediction_val" class="analyzing">ĐANG KHỞI ĐỘNG AI</div>
            <div class="matrix-status">
                <div class="status-item">
                    <span class="status-label">Tin Cậy</span>
                    <span class="status-val" id="conf_rate">0%</span>
                </div>
                <div class="status-item">
                    <span class="status-label">Độ Nhạy</span>
                    <span class="status-val" id="sense_val" style="color:#4ade80">0%</span>
                </div>
                <div class="status-item">
                    <span class="status-label">Loại Cầu</span>
                    <span class="status-val" id="pattern_val" style="color:#fbbf24">Dò tìm...</span>
                </div>
                <div class="status-item">
                    <span class="status-label">Xu Hướng</span>
                    <span class="status-val" id="trend_val">--</span>
                </div>
            </div>
        </div>

        <div id="val_result" class="result-display">...</div>
    </div>
</div>

<script>
/** * MATRIX ENGINE v7.0 - EVOLUTION 
 * Tối ưu logic nhận diện Pattern & Quản lý rủi ro
 */
class MatrixEngine {
    constructor() {
        this.history = [];
    }

    updateHistory(resultStr) {
        if (!resultStr) return;
        this.history = resultStr.toUpperCase().replace(/[^BPT]/g, '').split('');
    }

    analyze() {
        const h = this.history;
        const len = h.length;
        if (len < 4) return null;

        let bScore = 0, pScore = 0;
        let patternName = "CẦU TỰ DO";
        let trendName = "ỔN ĐỊNH";

        const last = h[len - 1];
        const last2 = h[len - 2];
        const last3 = h[len - 3];
        const last4 = h[len - 4];

        // 1. PHÂN TÍCH CHUỖI (STREAK)
        let streak = 1;
        for (let i = len - 1; i > 0; i--) {
            if (h[i] === h[i-1]) streak++; else break;
        }

        // 2. NHẬN DIỆN MẪU HÌNH (PATTERN RECOGNITION)
        const s4 = h.slice(-4).join('');
        const s6 = h.slice(-6).join('');

        if (streak >= 3 && streak < 7) {
            patternName = `CẦU BỆT ${last === 'B' ? 'CÁI' : 'CON'}`;
            last === 'B' ? bScore += 6 : pScore += 6; // Theo bệt
        } else if (streak >= 7) {
            patternName = "BỆT DÀI (HẾT)";
            last === 'B' ? pScore += 3 : bScore += 3; // Dự đoán bẻ bệt
        } else if (s4 === "BPBP" || s4 === "PBPB") {
            patternName = "CẦU ĐẢO 1-1";
            last === 'B' ? pScore += 5 : bScore += 5;
        } else if (s4 === "BBPP" || s4 === "PPBB") {
            patternName = "CẦU ĐÔI 2-2";
            (last === last2) ? (last === 'B' ? pScore += 4 : bScore += 4) : (last === 'B' ? bScore += 4 : pScore += 4);
        } else if (s6.includes("BPPBPP") || s6.includes("PBB PBB")) {
            patternName = "CẦU NHỊP 1-2";
            last === 'P' ? bScore += 5 : pScore += 5;
        }

        // 3. TÍNH ĐỘ BIẾN ĐỘNG (VOLATILITY)
        let jumps = 0;
        const recent = h.slice(-10);
        for(let i=0; i<recent.length-1; i++) if(recent[i] !== recent[i+1]) jumps++;
        const stability = Math.max(0, 100 - (jumps * 10));

        // 4. QUYẾT ĐỊNH
        let side = null;
        if (Math.abs(bScore - pScore) >= 1) {
            side = bScore > pScore ? 'B' : 'P';
        } else {
            side = last === 'B' ? 'P' : 'B'; // Default đảo nếu ko rõ
        }

        const confidence = Math.min(52 + (Math.abs(bScore - pScore) * 8), 98.5);
        const winProb = confidence / 100;
        const kelly = Math.max(0, (winProb * 2 - 1) * 15).toFixed(1);

        return {
            side: side,
            decision: side === 'B' ? 'BANKER' : 'PLAYER',
            pattern: patternName,
            trend: stability > 60 ? "TIỀM NĂNG" : "BIẾN ĐỘNG",
            conf: confidence.toFixed(1),
            sensitivity: stability,
            kelly: stability < 30 ? "0.0" : kelly
        };
    }
}

const ai = new MatrixEngine();
let currentTable = "";
let lastRawData = "";

async function fetchData() {
    try {
        const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent("https://toolbcr.com/baccarat/tables.php?action=get_data&id=1&t="+Date.now())}`);
        const json = await res.json();
        const data = JSON.parse(json.contents);
        
        const sel = document.getElementById("tableSelect");
        if(sel.options.length < 2) {
            sel.innerHTML = data.map(t => `<option value="${t.table_name}">${t.table_name}</option>`).join('');
            if(!currentTable) currentTable = data[0].table_name;
        }

        const table = data.find(t => t.table_name === currentTable);
        if(!table) return;

        // Hiển thị lịch sử
        document.getElementById("val_result").innerHTML = table.result.split('').map(c => {
            let cls = c === 'B' ? 'b-text' : (c === 'P' ? 'p-text' : 't-text');
            return `<span class="${cls}">${c}</span>`;
        }).join(' ');

        if (table.result !== lastRawData) {
            lastRawData = table.result;
            ai.updateHistory(table.result);
            
            const view = document.getElementById("prediction_val");
            view.innerHTML = `<span class="analyzing">ĐANG PHÂN TÍCH...</span>`;
            
            setTimeout(() => {
                const res = ai.analyze();
                if(!res) return;
                
                view.innerText = res.decision;
                view.style.color = res.decision === 'BANKER' ? '#ff4d4d' : '#3b82f6';
                view.style.textShadow = `0 0 20px ${res.decision === 'BANKER' ? 'rgba(255,77,77,0.5)' : 'rgba(59,130,246,0.5)'}`;
                
                document.getElementById("conf_rate").innerText = res.conf + "%";
                document.getElementById("sense_val").innerText = res.sensitivity + "%";
                document.getElementById("pattern_val").innerText = res.pattern;
                document.getElementById("trend_val").innerText = res.trend;
                document.getElementById("kelly_bet").innerText = res.kelly + "%";
                document.getElementById("next_round").innerText = "#" + (table.result.length + 1);
                
                document.getElementById("sense_val").style.color = res.sensitivity > 60 ? "#4ade80" : "#ff4d4d";
            }, 800);
        }
    } catch(e) { console.log("Reconnecting..."); }
}

function onTableChange() {
    currentTable = document.getElementById("tableSelect").value;
    lastRawData = "";
    fetchData();
}

// Drag & Drop
const dt = document.getElementById("dragTool");
let active = false, ox = 0, oy = 0, curX = 0, curY = 0;

dt.onpointerdown = e => { 
    if(e.target.tagName !== 'SELECT') { 
        active = true; 
        ox = e.clientX - curX; 
        oy = e.clientY - curY; 
        dt.style.transition = "none";
    } 
};
document.onpointermove = e => { 
    if(active) { 
        curX = e.clientX - ox; 
        curY = e.clientY - oy; 
        dt.style.transform = `translate(${curX}px, ${curY}px)`; 
    } 
};
document.onpointerup = () => active = false;

// Toggle UI
document.getElementById("robotTrigger").onclick = () => {
    const box = document.getElementById("mainUI");
    const isHidden = box.style.opacity === "0";
    box.style.opacity = isHidden ? "1" : "0";
    box.style.pointerEvents = isHidden ? "auto" : "none";
    box.style.transform = isHidden ? "scale(1)" : "scale(0.8)";
};

setInterval(fetchData, 4000);
fetchData();
</script>
</body>
</html>
